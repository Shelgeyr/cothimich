# gpsd configuration
# Passed to gpsd at startup via /etc/default/gpsd

# GPS device(s) - override via environment variable GPS_DEVICES
# e.g. /dev/ttyUSB0, /dev/ttyACM0, /dev/ttyS0
START_DAEMON="true"
GPSD_OPTIONS="-n -G"
DEVICES="${GPS_DEVICES:-/dev/ttyUSB0}"
USBAUTO="true"
GPSD_SOCKET="/run/gpsd/gpsd.sock"
