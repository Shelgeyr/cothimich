# chrony.conf - GPS-disciplined NTP server
#
# GPS via gpsd SHM (shared memory) segments:
#   SHM 0 = NMEA time (coarse, ~1s accuracy)
#   SHM 1 = PPS (precise, ~1us accuracy if your GPS has PPS output)

# GPS NMEA via gpsd SHM - used as a rough reference
refclock SHM 0 offset 0.5 delay 0.2 refid GPS noselect

# PPS via gpsd SHM - high precision, requires PPS-capable GPS
# Comment this out if your GPS doesn't have a PPS pin
refclock SHM 1 offset 0.0 delay 0.001 refid PPS prefer

# Upstream NTP servers as fallback (and for initial sync if GPS cold-start)
pool 2.pool.ntp.org iburst

# Allow LAN clients to query this server
# Adjust to match your network
allow 192.168.0.0/16
allow 10.0.0.0/8
allow 172.16.0.0/12

# Serve time even if not synced (local stratum)
local stratum 10

# Step the clock if off by more than 1 second on first three updates
makestep 1 3

# Record drift
driftfile /var/lib/chrony/drift

# Logging
logdir /var/log/chrony
log tracking measurements statistics

# Run as chrony user
user _chrony
