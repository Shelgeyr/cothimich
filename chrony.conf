# chrony.conf - GPS-disciplined NTP server
#
# GPS via gpsd SHM (shared memory) segments:
#   SHM 0 = NMEA time (coarse, ~1s accuracy)
#   SHM 1 = PPS (precise, ~1us accuracy if your GPS has PPS output)

# GPS NMEA via gpsd SHM
refclock SHM 0 offset -0.041 delay 0.2 refid GPS precision 1e-1

# PPS via gpsd SHM - high precision
refclock SHM 1 offset 0.0 delay 0.001 refid PPS prefer

# WWV, Fort Collins, Colorado
server time-a-wwv.nist.gov iburst
server time-b-wwv.nist.gov iburst
server time-c-wwv.nist.gov iburst
server time-d-wwv.nist.gov iburst
server time-e-wwv.nist.gov iburst

# NIST, Boulder, Colorado
server time-a-b.nist.gov iburst
server time-b-b.nist.gov iburst
server time-c-b.nist.gov iburst
server time-d-b.nist.gov iburst
server time-e-b.nist.gov iburst

# Allow LAN clients to query this server
allow 192.168.0.0/16
allow 10.0.0.0/8
allow 172.16.0.0/12

# Serve time even if not synced (local stratum)
local stratum 10

# Step the clock if off by more than 1 second on first three updates
makestep 1 3

# Record drift
driftfile /var/lib/chrony/drift

# Logging
logdir /var/log/chrony
log tracking measurements statistics

# Run as chrony user
bindcmdaddress /run/chrony/chronyd.sock
user _chrony
